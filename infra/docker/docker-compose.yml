version: '3.9'
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stellar_bounty
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: ../../apps/backend
    command: npm run start:dev
    working_dir: /workspace/apps/backend
    volumes:
      - ../../apps/backend:/workspace/apps/backend
      - /workspace/apps/backend/node_modules
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/stellar_bounty
    depends_on:
      - postgres

  frontend:
    build: ../../apps/frontend
    command: npm run dev -- --hostname 0.0.0.0
    working_dir: /workspace/apps/frontend
    volumes:
      - ../../apps/frontend:/workspace/apps/frontend
      - /workspace/apps/frontend/node_modules
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres-data:
